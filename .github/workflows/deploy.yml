name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Optional package repo in owner/name form"
        required: false
        type: string
      source_ref:
        description: "Optional git ref or release tag for the package docs"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --locked

      - name: Sync package docs
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.source_repo }}" ] && [ -n "${{ github.event.inputs.source_ref }}" ]; then
            uv run python scripts/sync_docs.py \
              --source-repo "${{ github.event.inputs.source_repo }}" \
              --source-ref "${{ github.event.inputs.source_ref }}"
          else
            uv run python scripts/sync_docs.py
          fi

      - name: Build site
        run: uv run mkdocs build -f .build/site-src/mkdocs.yml -d "${GITHUB_WORKSPACE}/site"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
